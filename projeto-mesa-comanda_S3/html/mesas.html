        function criaMesaHTML(nome) {
            //console.log(nome)
            //nome
            const mesa = document.createElement('div');
            mesa.innerHTML = `<div class="mesa">
                    <h1>${nome}</h1>
                    <p>No coração do restaurante, encontra-se a mesa redonda número 12, um ponto de encontro para amigos, famílias e casais em busca de uma experiência gastronômica autêntica e acolhedora.</p>
                    <a href="#">ver mesa ></a>
                </div>`

            const principal = document.getElementById('principal')
            principal.appendChild(mesa)
        }

        function criaMesa(nome) {
            const mesa = document.createElement('div');
            mesa.classList.add('mesa')

            const h1 = document.createElement('h1')
            h1.textContent = nome

            const p = document.createElement('p')
            p.textContent = "No coração do restaurante, encontra-se a mesa redonda número 12, um ponto de encontro para amigos, famílias e casais em busca de uma experiência gastronômica autêntica e acolhedora"

            const a = document.createElement('a')
            a.textContent = "ver mesa"
            a.href = "#"

            mesa.appendChild(h1)
            mesa.appendChild(p)
            mesa.appendChild(a)

            const principal = document.getElementById('principal')
            principal.appendChild(mesa)

           //return mesa          
        }

        criaMesa('Mesa Inicial')

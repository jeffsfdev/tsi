    <main>
        <!--
        <div class="thumbail"></div>
        <div class="conteudo">
            <h1>Comida saudável, gostosa e pronta em minutos</h1>
            <p>Já pensou em ter um chef cozinhando para você todo dia? É isso que a gente faz: criamos pratos

        <div class="thumbail"></div>
        <a href="#" class="link" id="btnCriar">Criar Comanda</a>
        <div class="conteudo" id="principal">
    </main>
    <script>

        document.getElementById('btnCriar').addEventListener("click", function (evento) {
            // alert('clicado');
            //console.log(evento.target)
            criaComanda('Nova Comanda')
        })

        function criaComandaHTML(nome) {
            //console.log(nome)
            //nome
            const comanda = document.createElement('div');
            comanda.innerHTML = `<div class="comanda">
                    <h1>${nome}</h1>
                    <p>Já pensou em ter um chef cozinhando para você todo dia? É isso que a gente faz: criamos pratos
                plant-based deliciosos e nutritivos, e entregamos na porta da sua casa.</p>
                    <a href="#">ver cardápio ></a>
                </div>`

            const principal = document.getElementById('principal')
            principal.appendChild(comanda)
        }

        function criaComanda(nome) {
            const comanda = document.createElement('div');
            comanda.classList.add('comanda')

            const h1 = document.createElement('h1')
            h1.textContent = nome

            const p = document.createElement('p')
            p.textContent = "Já pensou em ter um chef cozinhando para você todo dia? É isso que a gente faz: criamos pratos plant-based deliciosos e nutritivos, e entregamos na porta da sua casa."

            const a = document.createElement('a')
            a.textContent = "ver cardápio"
            a.href = "#"

            comanda.appendChild(h1)
            comanda.appendChild(p)
            comanda.appendChild(a)

            const principal = document.getElementById('principal')
            principal.appendChild(comanda)

            //return comanda          
        }

        criaComanda('Comanda Inicial')

    </script>
